name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build hosting artifacts
        run: npm run prepare:hosting

      - name: Verify generated Tailwind CSS
        run: |
          test -f .deploy/OdznakaGO/tailwind.css
          test -s .deploy/OdznakaGO/tailwind.css

      - name: Deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx gh-pages -d .deploy -r "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

